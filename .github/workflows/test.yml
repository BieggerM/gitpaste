name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: sudo apt-get update
      - run: sudo apt-get install --no-install-recommends --yes zsh
      - run: go test -race ./...
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"
      - run: bash -n shell/gitpaste.bash
      - run: zsh -n shell/gitpaste.zsh
