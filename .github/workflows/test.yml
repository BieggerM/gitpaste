name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false
      - run: sudo apt-get update
      - run: sudo apt-get install --no-install-recommends --yes zsh
      - run: go test -race ./...
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"
      - run: bash -n shell/gitpaste.bash
      - run: zsh -n shell/gitpaste.zsh
